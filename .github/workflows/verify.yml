name: Verify Canon
on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Clone canon and verify
        run: |
          git clone https://github.com/abrahamkolo/reliance-infrastructure-canon.git
          python verify.py --path ./reliance-infrastructure-canon
          python verify.py --path ./reliance-infrastructure-canon --json
